name: Main Branch Only

on:
  push:
    branches: [main]

jobs:
  # Auto-update snapshots on merge to main
  update-snapshots:
    name: Update Visual Snapshots
    runs-on: ubuntu-latest

    permissions:
      contents: write

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: eurostar_portfolio_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: |
          cd frontend && npm ci
          cd ../backend && npm ci

      - name: Install Playwright browsers
        run: |
          cd frontend
          npx playwright install chromium --with-deps

      - name: Start backend server
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/eurostar_portfolio_test
          DEV_MODE: 'true'
          PORT: 3000
        run: |
          cd backend
          npm run dev &
          sleep 5

      - name: Update visual snapshots
        run: |
          cd frontend
          npm run e2e:visual:update

      - name: Check for snapshot changes
        id: changes
        run: |
          cd frontend
          if git diff --quiet e2e/visual/*.spec.ts-snapshots/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated snapshots
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add frontend/e2e/visual/*.spec.ts-snapshots/
          git commit -m "chore: auto-update visual snapshots [skip ci]"
          git push
